spring.application.name=Springboot-API-REST

# Configuración de la base de datos MySQL
# IMPORTANTE: En producción, estas variables se configuran mediante variables de entorno
# Para desarrollo local, puedes descomentar y configurar tus credenciales
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ventas_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ventas_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}

# Configuración de Hibernate
spring.jpa.database=mysql
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.swagger-ui.path=/swagger-ui.html
server.port=8088
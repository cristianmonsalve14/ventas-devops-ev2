version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: ventas-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ventas_db
      MYSQL_USER: ventas_user
      MYSQL_PASSWORD: monsalve1974
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3308:3306"
    volumes:
      - mysql_data_ventas:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ventas-backend:
    image: ventas-backend
    container_name: ventas-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ventas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ventas_user
      SPRING_DATASOURCE_PASSWORD: monsalve1974
    ports:
      - "8088:8088"
    restart: always
    networks:
      - ventas-net
    # Descomenta si quieres montar el código fuente para desarrollo en caliente
    # volumes:
    #   - ./src:/app/src

volumes:
  mysql_data_ventas:

networks:
  ventas-net:
    driver: bridge
